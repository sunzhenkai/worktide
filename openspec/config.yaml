schema: spec-driven

context: |
  项目名称：WorkTide
  类型：TUI（终端用户界面）个人中心
  编程语言：Go（Golang）
  输出语言：简体中文（所有文档、UI 文案、注释均使用简体中文）
  定位：集成一系列工具，打造个性化的工作流中心
  架构特征：
    - 主体为 TUI 应用，可能包含本地后端服务
    - 模块化工具集成，支持按需启用
    - 跨平台优先（macOS / Linux / Windows）
  约定：
    - 遵循 Go 项目标准布局（cmd / internal / pkg）
    - 使用模块化、可插拔的工具注册机制
    - 优先选用主流、维护活跃的开源库
    - 提交信息使用 Conventional Commits 风格

rules:
  proposal:
    - 简体中文撰写
    - 控制在 600 字以内
    - 必须包含「非目标」章节
    - 明确价值与适用人群
  design:
    - 简体中文撰写
    - 必须包含技术选型理由
    - 必须包含模块划分与数据流
    - 关键决策需列出备选方案与取舍
  tasks:
    - 简体中文撰写
    - 任务拆分粒度：单个任务不超过 2 小时
    - 每个任务以动词开头，可独立验收
    - 按阶段分组（如：初始化 / 核心框架 / 工具集成 / 打磨）
